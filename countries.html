        rel="stylesheet">

    <!-- Project CSS -->

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand" href="index.html">
            🌍 World Explorer
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navMenu">

            <span class="navbar-toggler-icon"></span>

        <div class="collapse navbar-collapse" id="navMenu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                </li>

            </ul>

        </div>

    </div>

</nav>


<!--=========================================================
    PAGE HEADER
==========================================================-->

<div class="container mt-5">

    <h1 class="text-center">
        🌍 Browse Countries
    </h1>

    <p class="text-center text-muted">

        Browse all countries alphabetically.
        Click View Details on any country to view more information.

    </p>

</div>

<!-- =====================================================
      COUNTRY SEARCH

     Allows users to quickly search for countries.

     Search functionality will be connected
     during Mission 6.8 Phase 2..
    ====================================================== -->

     <div class="row mb-4">

       <!-- <div class="col-md-3 mx-auto"> -->
            <div class="col-md-3 ns-0">
                
            <input
                type="text"
                id="countrySearch"
                class="form-control"
                placeholder="🔍 Enter country name..."
        >

        </div>

    </div> 

<!--=========================================================
    COUNTRY CARDS

    JavaScript will dynamically create Bootstrap cards
    and insert them into this container.
==========================================================-->

<div class="container my-5">

    <div
        id="countriesContainer"
        class="row g-4">

        <!-- Countries will appear here -->

    </div>

</div>
<!--

-->
<!------------------------------------------
        return to Home Page link
-------------------------------------------> 
    <p>
        <a class="home-link" href="index.html">
            ← Return to Home Page
        </a>
    </p>

<!--=========================================================
    FOOTER
==========================================================-->

<footer class="bg-dark text-white text-center py-3">

    <p>&copy; 2026 Sasa Milo. All rights reserved.</p>

</footer>

<!-- Bootstrap JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- API Layer -->
<script src="js/api.js"></script>

<!-- Local backup data / Page Logic -->
<script src="js/countries.js"></script>

<!-- Search / Filtering -->
<script src="js/search.js"></script>

<!-- Additional country information -->
<script src="js/anthemData.js"></script>

<!-- Render country cards -->
<script src="js/countryRenderer.js"></script>

<!-- Country Details Modal -->
<script src="js/modal.js"></script>

<!-- ==========================================================
     COUNTRY DETAILS MODAL
     This Bootstrap modal will display detailed information
     about the country selected by the user.
=========================================================== -->

<div
    class="modal fade"
    id="countryModal"
    tabindex="-1"
    aria-labelledby="countryModalLabel"
    aria-hidden="true">

    <div class="modal-dialog modal-lg">

        <div class="modal-content">

            <!-- Modal Header -->
            <div class="modal-header">

                 <h3
                    class="modal-title">

                    🌍 Country Details

                </h3>   

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

        <div class="modal-body text-center">

            <img
                id="modalFlag"
                src=""
                alt="Country Flag"
                class="img-fluid mb-3"
                style="max-height:200px;">

            <h4 id="modalCountryName"></h4>

            <div
                id="modalDetails"
                class="text-start mt-3">

            </div>

        </div>

            <!-- Modal Footer -->
            <div class="modal-footer">

                <button
                    type="button"
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Close

                </button>

            </div>

        </div> 

    </div> 

</div> 

</body>
