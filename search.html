<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Countries</title>

    <!-- Add Bootstrap CSS link for styling
         added to ensure consistent styling across pages -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container py-5">

    <h1>Search Countries</h1>

    <input
        type="text"
        id="searchBox"
        placeholder="Search Countries..."
        oninput="filterCountries()"
    >

    <!-- =====================================================
     SEARCH RESULTS

     Shared container used by countryRenderer.js
    ====================================================== -->

<div
    id="countriesContainer"
    class="row g-4">

    Results will appear here...

</div>

    <p>
        <a class="home-link" href="index.html">
            ← Return to Home Page
        </a>
    </p>

</div>

<!--script src="data/countries.js"></script> -->
<script src="js/api.js"></script>

<!-- Country rendering functions -->
<script src="js/countryRenderer.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/modal.js"></script>

<script src="js/anthems.js"></script>

<script src="js/search.js"></script>

<!--------------------------------------------------------
     COUNTRY DETAILS MODAL
     This Bootstrap modal will display detailed information
     about the country selected by the user.
=========================================================== -->

<div
    class="modal fade"
    id="countryModal"
    tabindex="-1"
    aria-hidden="true">

    <div class="modal-dialog modal-lg modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">

                <h4
                    class="modal-title"
                    id="modalCountryName">

                    Country

                </h4>
            
                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">

                </button>

            </div>

            <div class="modal-body">

                <div class="text-center mb-4">

                    <img
                        id="modalFlag"
                        src=""
                        class="img-fluid"
                        style="max-height:200px;">

                </div> 

                <div id="modalDetails">

                    <!-- JavaScript inserts country details here -->

                </div>
            </div> 

        </div> 

    </div>

</div>

</body>
</html>
