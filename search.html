<!DOCTYPE html>
<html lang="en">
<head>

    <title>Search Country</title>

</head>
<body>
 <!-------------------------------------------------------------------------------
    Input Search Box where the countries array will be filtered,
    as you typed in the Search Box, refer codes below: oninput="filterCountries()"
 ------Input Country-------------------------------------------------------------->
 <input
    type="text"
    id="searchBox"
    placeholder="Search Countries..."
    oninput="filterCountries()"
    style="width:300px; padding:10px; margin-bottom:20px;">

<!--
     Country Data Output--------->
<div id="output">
    Results will appear here...
</div>  

<!------------------------------------------
         Search functionality : Calling JS
-------------------------------------------->
<script src="/js/search.js"></script>
</body>
</html>
