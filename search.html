<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Countries</title>

    <!-- Add Bootstrap CSS link for styling
         added to ensure consistent styling across pages -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container py-5">

    <h1>Search Countries</h1>

    <input
        type="text"
        id="searchBox"
        placeholder="Search Countries..."
        oninput="filterCountries()"
    >

    <div id="output">
        Results will appear here...
    </div>

    <p>
        <a class="home-link" href="index.html">
            ← Return to World Explorer Main Page
        </a>
    </p>

</div>

<script src="data/countries.js"></script>
<script src="js/api.js"></script>
<script src="js/anthems.js"></script>
<script src="js/search.js"></script>

<!-- Country Detail Modal -->
<div class="modal fade" id="countryModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Country Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" id="modalBody">
        <!-- Dynamic content goes here -->
      </div>

    </div>
  </div>
</div>

</body>
</html>
